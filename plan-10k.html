    jueves: { tipo: "🏃 Carrera — Tempo Run", ejercicios: ["5 min caminata → 5.5 km/h", "3 min trote suave → 8.5 km/h", "20 min tempo → 10.0 km/h", "3 min trote suave → 8.5 km/h", "5 min caminata → 5.5 km/h"], nota: "Último tempo fuerte. 5 min menos que semanas 9–10, misma velocidad. Confía en el proceso.", cardioDetail: { tipo: "Tempo Run", duracion: "20 min continuos", velocidad: "10.0 km/h", calentamiento: "8.5 km/h × 3 min", inclinacion: "1.0%" } },
    viernes: { tipo: "💪 Legs", ejercicios: ["Prensa de pierna 3×10", "Curl femoral 3×12", "Hip thrust 3×10", "Gemelos 3×15"], nota: "Simplificado. Empezamos a bajar el volumen." }
  },
  12: {
    lunes: { tipo: "💪 Push — Tapering ⚡", ejercicios: ["Press banca plano 2×8 (misma carga)", "Press militar sentado 2×10", "Elevaciones laterales 2×12", "Tricep pushdown 2×12"], nota: "⚡ TAPERING. Misma carga, mitad de series. El músculo se mantiene. Llegar fresco el domingo es el objetivo." },
    martes: { tipo: "🏃 Carrera — Activación", ejercicios: ["5 min caminata → 5.5 km/h", "20 min trote suave → 8.5 km/h", "5 min caminata → 5.5 km/h"], nota: "Carrera corta de activación. Solo para mantener las piernas despiertas. Sin esfuerzo real.", cardioDetail: { tipo: "Activación", duracion: "20 min", velocidad: "8.5 km/h", inclinacion: "1.0%" } },
    miercoles: { tipo: "💪 Pull — Tapering ⚡", ejercicios: ["Jalón al pecho 2×8", "Remo en polea 2×8", "Face pulls 2×15", "Plank 2×45s"], nota: "Sesión corta. 30 minutos máximo. Estás en modo conservación." },
    jueves: { tipo: "🏃 Carrera — Última antes del 10K", ejercicios: ["5 min caminata → 5.5 km/h", "15 min trote suave → 8.5 km/h", "3 × [30s a 10.0 km/h + 60s a 7.0 km/h] (activación)", "5 min caminata → 5.5 km/h"], nota: "Última carrera antes del 10K. Los 3 mini-intervalos solo activan las piernas, no cansan. Duerme mucho esta noche.", cardioDetail: { tipo: "Activación pre-carrera", duracion: "15 min + 3 mini-intervalos", velocidad: "8.5 km/h / 10.0 km/h × 30s", inclinacion: "1.0%" } },
    viernes: { tipo: "🧘 Descanso Pre-Carrera", ejercicios: ["Caminata ligera 20–30 min", "Estiramiento suave de piernas", "Prepara ropa y agua para mañana", "Come más carbohidratos hoy (arroz, pasta, tortillas extra)", "Duerme mínimo 8 horas"], nota: "🏁 MAÑANA ES EL 10K. Todo el trabajo ya está hecho. Solo descansa, come bien y confía en el proceso." }
  }
};

const WEEK_START_DATE = new Date(2026, 3, 13); // Month is 0-indexed: 3 = April

function getWeekDates(w) {
  const s = new Date(WEEK_START_DATE); s.setDate(s.getDate() + (w-1)*7);
  const e = new Date(s); e.setDate(e.getDate()+6);
  const f = d => d.toLocaleDateString("es-MX", {day:"numeric",month:"short"});
  return `${f(s)} – ${f(e)}`;
}
function getPhase(w) { return PHASES.find(p => p.weeks.includes(w)); }

const DAY_KEYS = ["lunes","martes","miercoles","jueves","viernes"];
const DAY_LABELS = {lunes:"Lun",martes:"Mar",miercoles:"Mié",jueves:"Jue",viernes:"Vie"};

function load() { try { const r=localStorage.getItem("fp3"); return r?JSON.parse(r):{}; } catch{return{};} }
function save(d) { try{localStorage.setItem("fp3",JSON.stringify(d));}catch{} }

function CardioCard({detail}) {
  if(!detail) return null;
  const isTempo = detail.tipo.includes("Tempo");
  const isInterval = detail.tipo.includes("Interval");
  const color = isTempo ? "#F7B731" : isInterval ? "#FC5C65" : "#4ECDC4";
  const fields = [
    detail.velocidad && ["VELOCIDAD", detail.velocidad, color],
    detail.velocidadRapido && ["RÁPIDO", detail.velocidadRapido, "#FC5C65"],
    detail.velocidadRecup && ["RECUPERACIÓN", detail.velocidadRecup, "#4ECDC4"],
    detail.duracion && ["DURACIÓN", detail.duracion, "#fff"],
    detail.series && ["SERIES", detail.series, "#fff"],
    detail.tiempoRapido && ["T. RÁPIDO", detail.tiempoRapido, "#FC5C65"],
    detail.tiempoRecup && ["T. RECUP.", detail.tiempoRecup, "#4ECDC4"],
    detail.calentamiento && ["CALENTAMIENTO", detail.calentamiento, "#aaa"],
    ["INCLINACIÓN", detail.inclinacion, "#fff"],
  ].filter(Boolean);
  return (
    <div style={{marginTop:12,padding:"12px 14px",background:`${color}12`,border:`1px solid ${color}30`,borderRadius:12}}>
      <div style={{fontSize:10,fontWeight:800,color,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>⚡ Config Cinta — {detail.tipo}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
        {fields.map(([label,val,c],i)=>(
          <div key={i} style={{background:"rgba(255,255,255,0.05)",borderRadius:8,padding:"7px 9px"}}>
            <div style={{fontSize:8,color:"#777",marginBottom:2}}>{label}</div>
            <div style={{fontSize:label==="CALENTAMIENTO"?11:14,fontWeight:700,color:c,lineHeight:1.2}}>{val}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function GymLog({weekNum,dayKey,data,onChange}) {
  const plan = WEEK_PLANS[weekNum]?.[dayKey];
  const key = `w${weekNum}_${dayKey}`;
  const entry = data[key]||{};
  if(!plan) return null;
  const isCardio = plan.tipo.includes("🏃");
  const isRest = plan.tipo.includes("🧘");
  if(isRest) return <div style={{padding:20,textAlign:"center",color:"#555",fontSize:13}}>🧘 Día de descanso — descansa de verdad</div>;
  return (
    <div>
      {plan.ejercicios.map((ej,i)=>{
        const done=entry[`done_${i}`]||false, kg=entry[`kg_${i}`]||"", sets=entry[`sets_${i}`]||"";
        return(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)",opacity:done?0.4:1}}>
            <input type="checkbox" checked={done} onChange={e=>onChange(key,{...entry,[`done_${i}`]:e.target.checked})} style={{accentColor:"#4ECDC4",width:16,height:16,flexShrink:0}}/>
            <div style={{flex:1,fontSize:12,color:done?"#555":"#ddd",lineHeight:1.4}}>{ej}</div>
            {!isCardio&&<>
              <input type="number" placeholder="kg" value={kg} onChange={e=>onChange(key,{...entry,[`kg_${i}`]:e.target.value})} style={{width:42,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#fff",fontSize:11,padding:"3px 4px",textAlign:"center",outline:"none"}}/>
              <input type="text" placeholder="sets" value={sets} onChange={e=>onChange(key,{...entry,[`sets_${i}`]:e.target.value})} style={{width:42,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#fff",fontSize:11,padding:"3px 4px",textAlign:"center",outline:"none"}}/>
            </>}
          </div>
        );
      })}
      <div style={{marginTop:10,padding:"8px 10px",background:"rgba(78,205,196,0.07)",borderRadius:8,border:"1px solid rgba(78,205,196,0.12)"}}>
        <div style={{fontSize:9,fontWeight:700,color:"#4ECDC4",marginBottom:4,letterSpacing:1}}>💡 NOTA</div>
        <div style={{fontSize:11,color:"#aaa",lineHeight:1.6}}>{plan.nota}</div>
      </div>
      {plan.cardioDetail && <CardioCard detail={plan.cardioDetail}/>}
      <textarea placeholder="Tus notas..." value={entry.notas||""} onChange={e=>onChange(key,{...entry,notas:e.target.value})} rows={2}
        style={{marginTop:10,width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#ccc",fontSize:11,padding:"8px 10px",resize:"none",outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
    </div>
  );
}

function WeightEntry({weekNum,data,onChange}) {
  const days=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
  const start=new Date(WEEK_START_DATE); start.setDate(start.getDate()+(weekNum-1)*7);
  return(
    <div>
      <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:"#555",marginBottom:10,textTransform:"uppercase"}}>📊 Peso Diario (ayunas · post-baño)</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5}}>
        {days.map((day,i)=>{
          const date=new Date(start); date.setDate(date.getDate()+i);
          const key=date.toISOString().split("T")[0];
          const entry=data[key]||{};
          return(
            <div key={key} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"7px 4px",border:"1px solid rgba(255,255,255,0.07)"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#aaa",textAlign:"center",marginBottom:5}}>{day}<br/><span style={{fontWeight:400,fontSize:9}}>{date.getDate()}/{date.getMonth()+1}</span></div>
              {[["kg","kg"],["gras","% G"],["musc","% M"]].map(([field,label])=>(
                <div key={field} style={{marginBottom:4}}>
                  <div style={{fontSize:8,color:"#555",marginBottom:1,textAlign:"center"}}>{label}</div>
                  <input type="number" step="0.1" placeholder="—" value={entry[field]||""} onChange={e=>onChange(key,{...entry,[field]:e.target.value})}
                    style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#fff",fontSize:11,padding:"3px 2px",textAlign:"center",outline:"none",boxSizing:"border-box"}}/>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  const [tab,setTab]=useState("plan");
  const [week,setWeek]=useState(1);
  const [day,setDay]=useState("lunes");
  const [gymData,setGymData]=useState({});
  const [weightData,setWeightData]=useState({});
  const [showLegend,setShowLegend]=useState(false);

  useEffect(()=>{ const s=load(); setGymData(s.gym||{}); setWeightData(s.weight||{}); },[]);

  const updGym=(k,v)=>{ const u={...gymData,[k]:v}; setGymData(u); save({gym:u,weight:weightData}); };
  const updWeight=(k,v)=>{ const u={...weightData,[k]:v}; setWeightData(u); save({gym:gymData,weight:u}); };

  const phase=getPhase(week);
  const dayPlan=WEEK_PLANS[week]?.[day];

  return(
    <div style={{minHeight:"100vh",background:"#0e0e12",color:"#fff",fontFamily:"'DM Sans','Segoe UI',sans-serif",paddingBottom:40}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#0e0e12 0%,#1a1a24 100%)",borderBottom:"1px solid rgba(255,255,255,0.06)",padding:"20px 20px 0"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}>
          <div>
            <div style={{fontSize:11,letterSpacing:3,color:"#444",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Plan 12 Semanas</div>
            <div style={{fontSize:22,fontWeight:800,letterSpacing:-0.5}}>Fuerza + 10K 🏁</div>
            <div style={{fontSize:12,color:"#555",marginTop:2}}>13 Abr → 5 Jul 2026 · Meta: sub-60 min</div>
          </div>
          <div style={{background:"rgba(252,92,101,0.15)",border:"1px solid rgba(252,92,101,0.3)",borderRadius:12,padding:"8px 12px",textAlign:"center"}}>
            <div style={{fontSize:10,color:"#FC5C65",fontWeight:700}}>META</div>
            <div style={{fontSize:13,fontWeight:800,color:"#FC5C65"}}>Jul 5</div>
            <div style={{fontSize:10,color:"#FC5C65"}}>10K 🏃</div>
          </div>
        </div>
        <div style={{display:"flex"}}>
          {[["plan","📅 Plan"],["tracker","📊 Tracker"]].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"10px 0",border:"none",background:"transparent",color:tab===id?"#fff":"#555",fontSize:13,fontWeight:tab===id?700:500,borderBottom:tab===id?"2px solid #4ECDC4":"2px solid transparent",cursor:"pointer"}}>{label}</button>
          ))}
        </div>
      </div>

      <div style={{padding:"16px 16px 0"}}>
        {/* LEGEND */}
        <button onClick={()=>setShowLegend(!showLegend)} style={{width:"100%",marginBottom:12,padding:"9px 14px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,color:"#aaa",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span>🏃 Guía de velocidades en cinta</span>
          <span style={{fontSize:10}}>{showLegend?"▲ cerrar":"▼ ver"}</span>
        </button>
        {showLegend&&(
          <div style={{marginBottom:14,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:14}}>
            {SPEED_LEGEND.map((s,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:i<SPEED_LEGEND.length-1?"1px solid rgba(255,255,255,0.05)":"none"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:s.color,flexShrink:0}}/>
                <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:s.color}}>{s.label}</div><div style={{fontSize:11,color:"#555"}}>{s.desc}</div></div>
                <div style={{fontSize:14,fontWeight:800,color:s.color}}>{s.speed}</div>
              </div>
            ))}
            <div style={{marginTop:10,padding:"8px 10px",background:"rgba(255,255,255,0.03)",borderRadius:8,fontSize:10,color:"#555"}}>
              💡 Siempre usa inclinación 1.0% para simular el exterior. Excepción: semana 7 (deload) → 0%.
            </div>
          </div>
        )}

        {/* WEEK SELECTOR */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,color:"#444",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Semana</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {Array.from({length:12},(_,i)=>i+1).map(w=>{
              const ph=getPhase(w); const isSel=w===week;
              return <button key={w} onClick={()=>setWeek(w)} style={{width:36,height:36,borderRadius:10,border:"none",background:isSel?ph.color:"rgba(255,255,255,0.06)",color:isSel?"#000":"#666",fontWeight:isSel?800:500,fontSize:13,cursor:"pointer",transition:"all 0.2s",boxShadow:isSel?`0 0 12px ${ph.color}55`:"none"}}>{w}</button>;
            })}
          </div>
          <div style={{marginTop:10,padding:"8px 12px",background:`${phase.color}15`,border:`1px solid ${phase.color}30`,borderRadius:10,display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:phase.color,flexShrink:0}}/>
            <div>
              <span style={{fontSize:12,fontWeight:700,color:phase.color}}>Fase {phase.id}: {phase.name}</span>
              <div style={{fontSize:11,color:"#555",marginTop:1}}>{getWeekDates(week)} · {phase.desc}</div>
            </div>
          </div>
        </div>

        {/* DAY SELECTOR */}
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          {DAY_KEYS.map(dk=>{
            const dp=WEEK_PLANS[week]?.[dk]; const isSel=dk===day;
            const isCardio=dp?.tipo?.includes("🏃"); const isRest=dp?.tipo?.includes("🧘");
            const accent=isRest?"#A29BFE":isCardio?"#F7B731":"#4ECDC4";
            const hasData=tab==="tracker"&&Object.keys(gymData[`w${week}_${dk}`]||{}).length>0;
            return(
              <button key={dk} onClick={()=>setDay(dk)} style={{flex:1,padding:"8px 4px",borderRadius:10,border:"none",background:isSel?`${accent}20`:"rgba(255,255,255,0.04)",color:isSel?accent:"#555",fontSize:11,fontWeight:isSel?700:500,cursor:"pointer",borderBottom:isSel?`2px solid ${accent}`:"2px solid transparent",position:"relative"}}>
                {DAY_LABELS[dk]}
                {hasData&&<span style={{position:"absolute",top:3,right:6,width:5,height:5,borderRadius:"50%",background:accent}}/>}
              </button>
            );
          })}
        </div>

        {/* PLAN TAB */}
        {tab==="plan"&&dayPlan&&(
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:16}}>
            <div style={{fontSize:15,fontWeight:800,marginBottom:12}}>{dayPlan.tipo}</div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {dayPlan.ejercicios.map((ej,i)=>(
                <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"8px 10px",background:"rgba(255,255,255,0.03)",borderRadius:8,fontSize:12,color:"#ccc"}}>
                  <span style={{color:"#4ECDC4",fontWeight:700,flexShrink:0}}>{i+1}.</span>{ej}
                </div>
              ))}
            </div>
            <div style={{marginTop:12,padding:"10px 12px",background:"rgba(78,205,196,0.07)",borderRadius:10,border:"1px solid rgba(78,205,196,0.12)"}}>
              <div style={{fontSize:9,fontWeight:700,color:"#4ECDC4",letterSpacing:1,marginBottom:4}}>💡 NOTA</div>
              <div style={{fontSize:12,color:"#aaa",lineHeight:1.6}}>{dayPlan.nota}</div>
            </div>
            {dayPlan.cardioDetail&&<CardioCard detail={dayPlan.cardioDetail}/>}
            <div style={{marginTop:10,padding:"8px 12px",background:"rgba(252,92,101,0.07)",borderRadius:10,border:"1px solid rgba(252,92,101,0.12)",fontSize:10,color:"#FC5C65",lineHeight:1.5}}>
              ⚠️ Core activado siempre · Columna neutral · Sin redondear lumbar
            </div>
          </div>
        )}

        {/* TRACKER TAB */}
        {tab==="tracker"&&(
          <div>
            <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:16,marginBottom:14}}>
              {dayPlan&&<div style={{fontSize:14,fontWeight:700,marginBottom:12}}>{dayPlan.tipo}</div>}
              <GymLog weekNum={week} dayKey={day} data={gymData} onChange={updGym}/>
            </div>
            <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:16}}>
              <WeightEntry weekNum={week} data={weightData} onChange={updWeight}/>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
